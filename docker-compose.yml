services:
  nginx:
    image: nginx:1.27-bookworm
    container_name: guardrail-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/backend-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: guardrail-backend
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-guardrail}:${POSTGRES_PASSWORD:-guardrail}@postgres:5432/guardrail
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost/api/auth/github/callback}
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_CHAT_PATH: ${LLM_CHAT_PATH:-messages}
      LLM_THINKER_MODEL: ${LLM_THINKER_MODEL}
      LLM_CODER_MODEL: ${LLM_CODER_MODEL}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://localhost}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      WORKSPACE_DIR: /tmp/guardrail-workspaces
    expose:
      - "3000"
    volumes:
      - backend_workspaces:/tmp/guardrail-workspaces

  postgres:
    image: pgvector/pgvector:pg16
    container_name: guardrail-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-guardrail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardrail}
      POSTGRES_DB: guardrail
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  backend_workspaces:
  postgres_data:
