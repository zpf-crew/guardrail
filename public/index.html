<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Chat Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .chat-container {
      width: 100%;
      max-width: 600px;
      height: 90vh;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .chat-header h1 {
      font-size: 1.5rem;
      margin-bottom: 5px;
    }
    .chat-header p {
      font-size: 0.9rem;
      opacity: 0.9;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.bot {
      align-self: flex-start;
      background: #f0f0f0;
      color: #333;
      border-bottom-left-radius: 4px;
    }
    .message .weather-data {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 0.85rem;
    }
    .message.bot .weather-data {
      background: rgba(0,0,0,0.05);
    }
    .chat-input {
      display: flex;
      padding: 20px;
      gap: 10px;
      border-top: 1px solid #eee;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      outline: none;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    .chat-input input:focus {
      border-color: #667eea;
    }
    .chat-input button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s;
    }
    .chat-input button:hover {
      transform: scale(1.05);
    }
    .chat-input button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .typing-indicator {
      align-self: flex-start;
      background: #f0f0f0;
      padding: 12px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      display: none;
    }
    .typing-indicator.active {
      display: block;
    }
    .dots {
      display: flex;
      gap: 4px;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>🌤️ Weather Chat Agent</h1>
      <p>Ask me about the weather for any city!</p>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message bot">Hello! I'm your weather assistant. Ask me about the weather in any city (e.g., "What's the weather in London?")</div>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="Ask about the weather..." autocomplete="off">
      <button id="sendButton" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const typingIndicator = document.getElementById('typingIndicator');
    let threadId = null;

    function appendMessage(text, isUser, weatherData = null) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
      messageDiv.textContent = text;
      
      if (weatherData) {
        const weatherDiv = document.createElement('div');
        weatherDiv.className = 'weather-data';
        weatherDiv.innerHTML = `
          <strong>${weatherData.city}</strong> (${weatherData.country})<br>
          <small>7-day forecast:</small>
          <ul style="margin: 5px 0; padding-left: 20px;">
            ${weatherData.daily.slice(0, 3).map(day => `
              <li>${day.date}: ${day.weatherDescription}, ${day.temperatureMin}°C - ${day.temperatureMax}°C</li>
            `).join('')}
            ${weatherData.daily.length > 3 ? `<li>... and ${weatherData.daily.length - 3} more days</li>` : ''}
          </ul>
        `;
        messageDiv.appendChild(weatherDiv);
      }
      
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTyping() {
      typingIndicator.classList.add('active');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
      typingIndicator.classList.remove('active');
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      appendMessage(text, true);
      messageInput.value = '';
      sendButton.disabled = true;
      showTyping();

      socket.emit('message', { text, thread_id: threadId });
    }

    socket.on('response', (data) => {
      hideTyping();
      sendButton.disabled = false;
      
      if (data.thread_id) {
        threadId = data.thread_id;
      }
      
      appendMessage(data.text, false, data.weather);
    });

    socket.on('error', (data) => {
      hideTyping();
      sendButton.disabled = false;
      appendMessage(`Error: ${data.message}`, false);
    });

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    socket.on('connect', () => {
      console.log('Connected to weather chat agent');
    });

    socket.on('disconnect', () => {
      console.log('Disconnected from weather chat agent');
      appendMessage('⚠️ Disconnected from server. Please refresh the page.', false);
    });
  </script>
</body>
</html>
